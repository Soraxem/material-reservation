<!DOCTYPE html>

<html lang="en">

<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <title>Article List</title>
    <link rel="stylesheet" href="/lib/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <!-- Navbar Placeholder -->
    <nav class="navbar shadow bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                Inventar
            </a>
        </div>
    </nav>

    <!-- Main Containers -->
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8 p-3">

                <button type="button" class="btn btn-secondary mb-3" onclick="refresh_list()"><i
                        class="bi bi-arrow-clockwise"></i> Refresh List</button>
                <button type="button" class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#creationModal"><i
                        class="bi bi-plus-lg"></i> Add Article</button>


                <div id="article-list" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">

                </div>

            </div>
        </div>
    </div>



    <!-- Modal for creating a new Article -->
    <div class="modal fade" id="creationModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5">New Article</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="recipient-name" class="col-form-label">Name:</label>
                            <input type="text" class="form-control" id="article-name">
                        </div>
                        <div class="mb-3">
                            <label for="message-text" class="col-form-label">Description:</label>
                            <textarea class="form-control" id="article-description"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="user_add_article()"
                        data-bs-dismiss="modal">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for deleting an Article -->
    <div class="modal fade" id="deletion-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5">Delete Article</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Do you really want to Delete this Article?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" onclick="user_delete_article()"
                        data-bs-dismiss="modal">Delete</button>
                </div>
            </div>
        </div>
    </div>

</body>

<!-- Template of the Article List entrys -->
<template id="article-template">
    <div id="article-id" class="col">

        <div class="card h-100 position-relative">
            <div class="position-absolute top-0 end-0 p-2">
                <button type="button" class="btn btn-primary m-1" onclick="refresh_list()">
                    <i class="bi bi-pencil-fill"></i>
                </button>
                <button type="button" class="btn btn-danger deletion-button m-1">
                    <i class="bi bi-trash3-fill"></i>
                </button>
            </div>

            <a href="/ziel" class="text-decoration-none text-reset article-link">

                <div class="card-header p-3">
                    <img src="/img/no-image.svg" class="card-image-top rounded p-2 mx-auto d-block w-100"
                        style="max-height: 25vh;">

                </div>


                <div class="card-body text-decoration-none">
                    <h5 class="card-title article-name"></h5>
                    <p class="card-text article-description"></p>
                </div>

            </a>
        </div>

    </div>
</template>


<!-- Fetching the JS api implementation -->
<script src="/lib/api.js"></script>
<script src="/lib/bootstrap.min.js"></script>


<script>

    // Fetch the form entrys and use the api to create an article
    async function user_add_article() {
        let name = document.querySelector("#article-name").value;
        let description = document.querySelector("#article-description").value;
        await create_article(name, description);
        refresh_list();
    }

    let currently_deleting = "";

    async function open_deletion_modal(id) {
        currently_deleting = id;
        new bootstrap.Modal(document.querySelector("#deletion-modal")).show();
    }

    async function user_delete_article() {
        await delete_article(currently_deleting);
        refresh_list();
    }

    const template = document.querySelector("#article-template");
    const list = document.querySelector("#article-list");

    // instanciate the templates for every article
    async function refresh_list() {
        let article_list = await list_article();

        list.textContent = "";

        for (let key in article_list) {
            if (article_list.hasOwnProperty(key)) {

                let clone = document.importNode(template.content, true);
                clone.querySelector(".article-name").textContent = article_list[key].name;
                clone.querySelector(".article-description").textContent = article_list[key].description;

                clone.querySelector("#article-id").id = article_list[key].pk;
                clone.querySelector(".article-link").href = "/article/?id=" + article_list[key].pk;

                clone.querySelector(".deletion-button").addEventListener("click", () => open_deletion_modal(article_list[key].pk));



                list.appendChild(clone);

            }
        }
    }


    refresh_list()
</script>

</html>
